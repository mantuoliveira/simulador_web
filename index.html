<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no"
    />
    <meta name="theme-color" content="#edf4fb" />
    <title>Simulador de Circuitos DC</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="icon.svg" type="image/svg+xml" />
    <script>
      (() => {
        const prefersDark = window.matchMedia?.("(prefers-color-scheme: dark)")?.matches === true;
        const theme = prefersDark ? "dark" : "light";
        document.documentElement.dataset.theme = theme;
        const metaTheme = document.querySelector('meta[name="theme-color"]');
        if (metaTheme) {
          metaTheme.setAttribute("content", theme === "dark" ? "#09111c" : "#edf4fb");
        }
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app-shell">
      <header id="top-bar" aria-label="Menu de componentes">
        <div id="component-strip" class="scroll-x"></div>
      </header>

      <main id="canvas-wrap">
        <canvas id="circuit-canvas" aria-label="Área do circuito"></canvas>
        <div id="status-pill" aria-live="polite"></div>
        <div id="terminal-label-modal" class="hidden" aria-hidden="true">
          <form id="terminal-label-form" class="terminal-label-card">
            <label for="terminal-label-input">Label do pad</label>
            <input
              id="terminal-label-input"
              name="terminal-label"
              type="text"
              maxlength="32"
              autocomplete="off"
              spellcheck="false"
            />
            <div class="terminal-label-actions">
              <button id="terminal-label-cancel" class="secondary" type="button">Cancelar</button>
              <button id="terminal-label-save" class="primary" type="submit">Salvar</button>
            </div>
          </form>
        </div>
      </main>

      <div id="value-wheel" class="hidden" aria-label="Roda de valores">
        <div class="wheel-ring"></div>
        <div class="wheel-pointer"></div>
        <div class="wheel-center">
          <div id="wheel-title">Valor</div>
          <div id="wheel-value">-</div>
          <div id="wheel-unit"></div>
        </div>
      </div>

      <footer id="bottom-bar">
        <div id="left-actions">
          <button
            id="simulate-btn"
            class="primary icon-only"
            type="button"
            title="Iniciar simulacao"
            aria-label="Iniciar simulacao"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M8 5.5v13l10-6.5z" />
            </svg>
          </button>
          <button
            id="theme-toggle-btn"
            class="secondary icon-only hidden"
            type="button"
            title="Ativar tema escuro"
            aria-label="Ativar tema escuro"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <defs>
                <clipPath id="theme-toggle-clip">
                  <circle cx="12" cy="12" r="8" />
                </clipPath>
              </defs>
              <g clip-path="url(#theme-toggle-clip)">
                <polygon points="4,4 4,20 20,4" fill="#0f172a" />
                <polygon points="4,20 20,4 20,20" fill="#ffffff" />
              </g>
              <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.5" />
              <line
                x1="6.5"
                y1="17.5"
                x2="17.5"
                y2="6.5"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
        <div id="center-actions">
          <button
            id="delete-btn"
            class="secondary danger hidden"
            type="button"
            title="Excluir selecionado"
            aria-label="Excluir selecionado"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M9 3h6l1 2h4v2H4V5h4l1-2zm-2 6h2v9H7V9zm4 0h2v9h-2V9zm4 0h2v9h-2V9zM6 9h12l-1 12H7L6 9z"
              />
            </svg>
          </button>
          <button
            id="edit-terminal-label-btn"
            class="secondary hidden"
            type="button"
            title="Editar label do pad"
            aria-label="Editar label do pad"
          >
            <svg viewBox="0 0 528.899 528.899" aria-hidden="true">
              <path
                d="M328.883,89.125l107.59,107.589l-272.34,272.34L56.604,361.465L328.883,89.125z M518.113,63.177l-47.981-47.981
                c-18.543-18.543-48.653-18.543-67.259,0l-45.961,45.961l107.59,107.59l53.611-53.611
                C532.495,100.753,532.495,77.559,518.113,63.177z M0.3,512.69c-1.958,8.812,5.998,16.708,14.811,14.565l119.891-29.069
                L27.473,390.597L0.3,512.69z"
                fill="currentColor"
              />
            </svg>
          </button>
        </div>
        <div id="right-actions">
          <button
            id="thermal-btn"
            class="secondary hidden"
            type="button"
            title="Mostrar potência dissipada"
            aria-label="Mostrar potência dissipada"
            aria-pressed="false"
          >
            <svg viewBox="0 0 45.659 45.659" aria-hidden="true">
              <g fill="currentColor">
                <path d="M30.619,27.309V7.781C30.619,3.49,27.124,0,22.833,0c-4.29,0-7.785,3.491-7.785,7.78v19.528c-1.902,1.949-3.05,4.604-3.05,7.522c0,5.972,4.857,10.828,10.829,10.828c5.97,0,10.834-4.856,10.834-10.828C33.661,31.912,32.52,29.258,30.619,27.309z M22.825,42.66c-4.316,0-7.824-3.512-7.824-7.828c0-2.527,1.174-4.779,3.077-6.211V16.237h3.372c0.552,0,1-0.47,1-1.022c0-0.553-0.448-1.021-1-1.021h-3.372v-2.466h3.372c0.552,0,1-0.434,1-0.986c0-0.552-0.448-0.986-1-0.986h-3.372V7.78c0-2.636,2.119-4.78,4.754-4.78c2.637,0,4.756,2.144,4.756,4.781v20.871c1.903,1.434,3.047,3.671,3.047,6.18C30.635,39.148,27.141,42.66,22.825,42.66z" />
                <path d="M25.334,30.463V18.632h-5.002v11.831c-1.549,0.874-2.537,2.502-2.537,4.369c0,2.788,2.251,5.046,5.038,5.046c2.788,0,5.034-2.258,5.034-5.046C27.867,32.966,26.885,31.337,25.334,30.463z" />
              </g>
            </svg>
          </button>
          <button
            id="bom-btn"
            class="secondary hidden"
            type="button"
            title="Lista de Materiais (BOM)"
            aria-label="Lista de Materiais"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4.5" y="2" width="15" height="20" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.9"/>
              <line x1="8" y1="8.5" x2="16" y2="8.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              <line x1="8" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              <line x1="8" y1="15.5" x2="13" y2="15.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </button>
          <button
            id="group-select-btn"
            class="secondary hidden"
            type="button"
            title="Selecionar varios"
            aria-label="Selecionar varios"
            aria-pressed="false"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect
                x="3.25"
                y="4.75"
                width="17.5"
                height="14.5"
                rx="2.4"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-dasharray="3 2.8"
              />
            </svg>
          </button>
          <button
            id="import-btn"
            class="secondary hidden"
            type="button"
            title="Importar circuito (JSON)"
            aria-label="Importar circuito"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 15l4-4h-3V4h-2v7H8l4 4zm-7 0h2v4h10v-4h2v6H5v-6z"/>
            </svg>
          </button>
          <button
            id="export-btn"
            class="secondary hidden"
            type="button"
            title="Exportar circuito (JSON)"
            aria-label="Exportar circuito"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 3l4 4h-3v7h-2V7H8l4-4zm-7 12h2v4h10v-4h2v6H5v-6z"
              />
            </svg>
          </button>
          <button
            id="png-btn"
            class="secondary hidden"
            type="button"
            title="Exportar PNG"
            aria-label="Exportar PNG"
          >
            PNG
          </button>
          <button
            id="current-arrow-btn"
            class="secondary hidden"
            type="button"
            title="Ocultar seta de corrente"
            aria-label="Ocultar seta de corrente"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 5c-5.85 0-9.64 5.22-10 5.78L1.5 12l.5 1.22C2.36 13.78 6.15 19 12 19s9.64-5.22 10-5.78l.5-1.22-.5-1.22C21.64 10.22 17.85 5 12 5zm0 11c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm0-6.2A2.2 2.2 0 1 0 12 14.2a2.2 2.2 0 0 0 0-4.4z"
              />
            </svg>
          </button>
          <button id="rotate-btn" class="secondary hidden" type="button" title="Rotacionar 90°">
            ↻
          </button>
          <button
            id="swap-op-amp-btn"
            class="secondary hidden"
            type="button"
            title="Inverter terminais"
            aria-label="Inverter terminais"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 3l4 4h-3v10h3l-4 4-4-4h3V7H8l4-4z"
              />
            </svg>
          </button>
        </div>
      </footer>
    </div>

    <input id="import-file-input" type="file" accept=".json,application/json" style="display:none" aria-hidden="true">
    <script type="module" src="app-bootstrap.js"></script>
  </body>
</html>
