<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no"
    />
    <meta name="theme-color" content="#0f172a" />
    <title>Simulador de Circuitos DC</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app-shell">
      <header id="top-bar" aria-label="Menu de componentes">
        <div id="component-strip" class="scroll-x"></div>
      </header>

      <main id="canvas-wrap">
        <canvas id="circuit-canvas" aria-label="Área do circuito"></canvas>
        <div id="status-pill" aria-live="polite"></div>
      </main>

      <div id="value-wheel" class="hidden" aria-label="Roda de valores">
        <div class="wheel-ring"></div>
        <div class="wheel-pointer"></div>
        <div class="wheel-center">
          <div id="wheel-title">Valor</div>
          <div id="wheel-value">-</div>
        </div>
      </div>

      <footer id="bottom-bar">
        <div id="left-actions">
          <button
            id="simulate-btn"
            class="primary icon-only"
            type="button"
            title="Iniciar simulacao"
            aria-label="Iniciar simulacao"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M8 5.5v13l10-6.5z" />
            </svg>
          </button>
          <button
            id="delete-btn"
            class="secondary danger hidden"
            type="button"
            title="Excluir selecionado"
            aria-label="Excluir selecionado"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M9 3h6l1 2h4v2H4V5h4l1-2zm-2 6h2v9H7V9zm4 0h2v9h-2V9zm4 0h2v9h-2V9zM6 9h12l-1 12H7L6 9z"
              />
            </svg>
          </button>
        </div>
        <div id="right-actions">
          <button
            id="export-btn"
            class="secondary hidden"
            type="button"
            title="Exportar PNG"
            aria-label="Exportar PNG"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 3l4 4h-3v7h-2V7H8l4-4zm-7 12h2v4h10v-4h2v6H5v-6z"
              />
            </svg>
          </button>
          <button
            id="current-arrow-btn"
            class="secondary hidden"
            type="button"
            title="Ocultar seta de corrente"
            aria-label="Ocultar seta de corrente"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 5c-5.85 0-9.64 5.22-10 5.78L1.5 12l.5 1.22C2.36 13.78 6.15 19 12 19s9.64-5.22 10-5.78l.5-1.22-.5-1.22C21.64 10.22 17.85 5 12 5zm0 11c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm0-6.2A2.2 2.2 0 1 0 12 14.2a2.2 2.2 0 0 0 0-4.4z"
              />
            </svg>
          </button>
          <button id="rotate-btn" class="secondary hidden" type="button" title="Rotacionar 90°">
            ↻
          </button>
          <button
            id="swap-op-amp-btn"
            class="secondary hidden"
            type="button"
            title="Inverter terminais"
            aria-label="Inverter terminais"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 3l4 4h-3v10h3l-4 4-4-4h3V7H8l4-4z"
              />
            </svg>
          </button>
        </div>
      </footer>
    </div>

    <script src="app.js" defer></script>
    <script src="app-routing.js" defer></script>
    <script src="app-simulation.js" defer></script>
    <script src="app-export.js" defer></script>
    <script src="app-bootstrap.js" defer></script>
  </body>
</html>
